<div class="container">
  <h2>Enregistrer un mouvement</h2>
  <div class="form-wrap">
    <form action="mouvements.php" method="POST">
      <div class="form-group">
        <label for="produit_id">Produit</label>
        <select id="produit_id" name="produit_id" required>
          <option value="">Choisir un produit...</option>
        </select>
      </div>
      <div class="form-group">
        <label for="type_mouvement">Type de mouvement</label>
        <select id="type_mouvement" name="type_mouvement" required>
          <option value="">Choisir...</option>
          <option value="entree">Entrée — Approvisionnement</option>
          <option value="vente">Sortie — Vente</option>
          <option value="perte">Sortie — Perte</option>
          <option value="casse">Sortie — Casse</option>
        </select>
      </div>
      <div class="form-group">
        <label for="quantite">Quantité</label>
        <input type="number" id="quantite" name="quantite" min="1" placeholder="Ex: 6" required>
      </div>
      <div class="form-group">
        <label for="commentaire">Commentaire (optionnel)</label>
        <input type="text" id="commentaire" name="commentaire" placeholder="Ex: Livraison fournisseur #42">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="mouvements.php" class="btn btn-secondary">Annuler</a>
      </div>
    </form>
  </div>
