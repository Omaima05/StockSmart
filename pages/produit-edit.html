<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modifier un Produit - StockSmart</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header>
  <h1>StockSmart Pro</h1>
</header>
<nav>
  <a href="../index.php">Accueil</a>
  <a href="produits.php">Produits</a>
  <a href="categories.php">Catégories</a>
  <a href="mouvements.php">Mouvements</a>
  <a href="login.php">Connexion</a>
</nav>
<div class="container">
  <h2>Modifier un produit</h2>
  <div class="form-wrap">
    <form action="produits.php" method="POST" enctype="multipart/form-data">
      <input type="hidden" name="id" value="">
      <div class="form-group">
        <label for="reference">Référence</label>
        <input type="text" id="reference" name="reference" placeholder="Ex : P001" required>
      </div>
      <div class="form-group">
        <label for="nom">Nom du produit</label>
        <input type="text" id="nom" name="nom" placeholder="Nom du produit" required>
      </div>
      <div class="form-group">
        <label for="marque">Marque</label>
        <input type="text" id="marque" name="marque" placeholder="Ex : Danone">
      </div>
      <div class="form-group">
        <label for="categorie">Catégorie</label>
        <select id="categorie" name="categorie_id" required>
          <option value="">Sélectionner une catégorie</option>
          <option value="1">Boissons</option>
          <option value="2">Snacks</option>
          <option value="3">Produits frais</option>
          <option value="4">Hygiène</option>
          <option value="5">Papeterie</option>
        </select>
      </div>
      <div class="form-group">
        <label for="quantite">Quantité</label>
        <input type="number" id="quantite" name="quantite" min="0" value="0">
      </div>
      <div class="form-group">
        <label for="seuil_alerte">Seuil d'alerte</label>
        <input type="number" id="seuil_alerte" name="seuil_alerte" min="0" value="5">
      </div>
      <div class="form-group">
        <label for="prix">Prix unitaire (€)</label>
        <input type="number" id="prix" name="prix" step="0.01" min="0" value="0.00">
      </div>
      <div class="form-group">
        <label for="image">Photo (optionnel)</label>
        <input type="file" id="image" name="image" accept="image/*">
      </div>
      <div class="form-actions">
        <button type="submit" name="modifier" class="btn btn-primary">Enregistrer les modifications</button>
        <a href="produits.php" class="btn btn-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
<footer>© 2026 StockSmart Pro</footer>
<script src="../js/script.js"></script>
</body>
</html>
